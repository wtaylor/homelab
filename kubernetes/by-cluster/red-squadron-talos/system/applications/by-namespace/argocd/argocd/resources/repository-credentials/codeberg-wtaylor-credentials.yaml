apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: codeberg-wtaylor-credentials
spec:
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  refreshInterval: 5m
  data:
  - secretKey: username
    remoteRef:
      key: kv/services/argocd/repo-creds-codeberg-wtaylor
      property: username
  - secretKey: password
    remoteRef:
      key: kv/services/argocd/repo-creds-codeberg-wtaylor
      property: password
  target:
    deletionPolicy: Delete
    template:
      engineVersion: v2
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repo-creds
      data:
        type: git
        url: https://codeberg.org/wtaylor
        username: '{{ .username }}'
        password: '{{ .password }}'
