apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: system-applications
spec:
  goTemplate: true
  syncPolicy:
    preserveResourcesOnDeletion: true
  generators:
  - git:
      repoURL: https://scm.w7x6t.dev/wtaylor/homelab.git
      revision: HEAD
      directories:
      - path: kubernetes/by-cluster/red-squadron-talos/system/applications/by-namespace/*/*
  template:
    metadata:
      name: '{{.path.basename}}'
    spec:
      project: system
      source:
        repoURL: https://scm.w7x6t.dev/wtaylor/homelab.git
        targetRevision: HEAD
        path: '{{.path.path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{index .path.segments 6}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: false
          allowEmpty: false
        syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
