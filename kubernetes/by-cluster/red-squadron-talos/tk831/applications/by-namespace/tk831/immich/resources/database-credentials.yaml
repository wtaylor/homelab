apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: immich-database-credentials
spec:
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  refreshInterval: 5m
  data:
  - secretKey: username
    remoteRef:
      key: kv/services/immich/postgres-credentials
      property: username
  - secretKey: password
    remoteRef:
      key: kv/services/immich/postgres-credentials
      property: password
  target:
    deletionPolicy: Delete
    template:
      data:
        db_url: "postgresql://{{.username}}:{{.password}}@postgres-tk831-immich-rw:5432/immich"
