apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: dbc-postgres-tk831-immich-credentials
spec:
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  refreshInterval: 5m
  data:
  - secretKey: username
    remoteRef:
      key: kv/services/immich/dbc-postgres-immich-credentials
      property: superuserUsername
  - secretKey: password
    remoteRef:
      key: kv/services/immich/dbc-postgres-immich-credentials
      property: superuserPassword
  target:
    deletionPolicy: Delete
    template:
      engineVersion: v2
      type: kubernetes.io/basic-auth
      data:
        username: '{{ .username }}'
        password: '{{ .password }}'
