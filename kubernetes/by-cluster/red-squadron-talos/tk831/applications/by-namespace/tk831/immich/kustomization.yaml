helmCharts:
- name: immich
  includeCRDs: false
  repo: https://immich-app.github.io/immich-charts
  releaseName: immich
  namespace: tk831
  version: "0.13.1"
  valuesInline:
    controllers:
      main:
        containers:
          main:
            image:
              tag: v3.0.0
    immich:
      metrics:
        # Enabling this will create the service monitors needed to monitor immich with the prometheus operator
        enabled: false
      persistence:
        # Main data store for all photos shared between different components.
        library:
          # Automatically creating the library volume is not supported by this chart
          # You have to specify an existing PVC to use
          existingClaim: immich-library
      # configuration is immich-config.json converted to yaml
      # ref: https://immich.app/docs/install/config-file/
      #
      configuration: {}
      # trash:
      #   enabled: false
      #   days: 30
      # storageTemplate:
      #   enabled: true
      #   template: "{{y}}/{{y}}-{{MM}}-{{dd}}/{{filename}}"
    # Dependencies
    valkey:
      enabled: true
    # Immich components
    server:
      enabled: true
      ingress:
        main:
          enabled: false
    machine-learning:
      enabled: true
      persistence:
        cache:
          enabled: true
          size: 10Gi
          type: emptyDir
          accessMode: ReadWriteOnce
resources:
- resources/library-pvc.yaml
- resources/db-cluster-admin-credentials.yaml
- resources/db-cluster.yaml
- resources/db-cluster-role-immich.yaml
- resources/database-credentials.yaml
- resources/database.yaml
- resources/routes.yaml
- resources/library-backup.yaml
patches:
- patch: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: immich-server
      namespace: tk831
    spec:
      template:
        spec:
          containers:
          - name: main
            env:
            - name: DB_DATABASE_NAME
              $patch: delete
            - name: DB_HOSTNAME
              $patch: delete
            - name: DB_PASSWORD
              $patch: delete
            - name: DB_USERNAME
              $patch: delete
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: immich-database-credentials
                  key: db_url
            resources:
              limits:
                cpu: 500m
                memory: 8Gi
- patch: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: immich-machine-learning
      namespace: tk831
    spec:
      template:
        spec:
          containers:
          - name: main
            env:
            - name: DB_DATABASE_NAME
              $patch: delete
            - name: DB_HOSTNAME
              $patch: delete
            - name: DB_PASSWORD
              $patch: delete
            - name: DB_USERNAME
              $patch: delete
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: immich-database-credentials
                  key: db_url
            resources:
              limits:
                cpu: 500m
                memory: 2Gi
