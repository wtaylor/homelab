apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: tk831-frigate
    app.kubernetes.io/name: frigate
  name: frigate
  namespace: tk831
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/instance: tk831-frigate
      app.kubernetes.io/name: frigate
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: tk831-frigate
        app.kubernetes.io/name: frigate
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: net.tk831.dev/coral-pci-enabled
                operator: Exists
              - key: net.tk831.dev/intel-igpu-enabled
                operator: Exists
      containers:
      - name: frigate
        image: ghcr.io/blakeblackshear/frigate:0.17.1
        imagePullPolicy: IfNotPresent
        securityContext:
          privileged: true
        envFrom:
        - secretRef:
            name: frigate-mqtt-credentials
        env:
        - name: PLUS_API_KEY
          valueFrom:
            secretKeyRef:
              key: apiKey
              name: frigate-plus-credentials
        ports:
        - containerPort: 5000
          name: http
          protocol: TCP
        - containerPort: 8971
          name: http-auth
          protocol: TCP
        - containerPort: 1935
          name: rtmp
          protocol: TCP
        - containerPort: 8554
          name: rtsp
          protocol: TCP
        - containerPort: 8555
          name: webrtc
          protocol: UDP
        - containerPort: 8555
          name: webrtc-tcp
          protocol: TCP
        - containerPort: 1984
          name: go2rtc-admin
          protocol: TCP
        livenessProbe:
          failureThreshold: 5
          httpGet:
            path: /
            port: http
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 10
        readinessProbe:
          failureThreshold: 5
          httpGet:
            path: /
            port: http
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 10
        resources:
          limits:
            cpu: 2600m
        volumeMounts:
        - mountPath: /dev/apex_0
          name: coral-dev
        - mountPath: /config
          name: config
        - mountPath: /data
          name: data
        - mountPath: /media
          name: media
        - mountPath: /dev/shm
          name: dshm
        - mountPath: /tmp
          name: tmp
      volumes:
      - name: coral-dev
        hostPath:
          path: /dev/apex_0
          type: ''
      - name: config
        persistentVolumeClaim:
          claimName: frigate-config
      - name: data
        emptyDir: {}
      - name: media
        persistentVolumeClaim:
          claimName: frigate-media
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 2Gi
      - name: tmp
        emptyDir:
          medium: Memory
          sizeLimit: 1Gi
