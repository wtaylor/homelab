apiVersion: v1
kind: Service
metadata:
  annotations:
  labels:
    app.kubernetes.io/instance: tk831-frigate
    app.kubernetes.io/name: frigate
  name: frigate
  namespace: tk831
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 5000
    protocol: TCP
    targetPort: http
  - name: http-auth
    port: 8971
    protocol: TCP
    targetPort: http-auth
  - name: rtmp
    port: 1935
    protocol: TCP
    targetPort: rtmp
  - name: rtsp
    port: 8554
    protocol: TCP
    targetPort: rtsp
  - name: webrtc-tcp
    port: 8555
    protocol: TCP
    targetPort: webrtc-tcp
  - name: webrtc-udp
    port: 8555
    protocol: UDP
    targetPort: webrtc-udp
  selector:
    app.kubernetes.io/instance: tk831-frigate
    app.kubernetes.io/name: frigate
