apiVersion: v1
kind: Service
metadata:
  name: bitwarden
  labels:
    app.kubernetes.io/name: bitwarden
spec:
  selector:
    app.kubernetes.io/name: bitwarden
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 8080
  - name: websocket
    protocol: TCP
    port: 3012
    targetPort: 3012
  type: ClusterIP
