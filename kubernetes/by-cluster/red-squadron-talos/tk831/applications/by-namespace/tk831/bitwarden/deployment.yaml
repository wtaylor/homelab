apiVersion: apps/v1
kind: Deployment
metadata:
  name: bitwarden
  labels:
    app.kubernetes.io/name: bitwarden
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bitwarden
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bitwarden
    spec:
      volumes:
      - name: bitwarden-data
        persistentVolumeClaim:
          claimName: bitwarden-data-pvc
      containers:
      - name: bitwarden
        image: vaultwarden/server:1.36.0
        imagePullPolicy: IfNotPresent
        envFrom:
        - configMapRef:
            name: bitwarden
        env:
        - name: SSO_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: bitwarden-oidc-client-credentials
              key: clientId
        - name: SSO_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: bitwarden-oidc-client-credentials
              key: clientSecret
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        - containerPort: 3012
          name: websocket
          protocol: TCP
        volumeMounts:
        - name: bitwarden-data
          mountPath: /data
