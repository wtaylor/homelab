apiVersion: apps/v1
kind: Deployment
metadata:
  name: linkwarden
  labels:
    app.kubernetes.io/name: linkwarden
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: linkwarden
  template:
    metadata:
      labels:
        app.kubernetes.io/name: linkwarden
    spec:
      containers:
      - name: linkwarden
        image: ghcr.io/linkwarden/linkwarden:v2.14.1
        resources:
          requests:
            memory: 1024Mi
            cpu: 250m
          limits:
            memory: 1024Mi
        envFrom:
        - configMapRef:
            name: linkwarden
        - secretRef:
            name: linkwarden-app-secrets
        - secretRef:
            name: linkwarden-db-credentials
        - secretRef:
            name: linkwarden-oidc-client-credentials
        - secretRef:
            name: linkwarden-s3-credentials
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        - containerPort: 3012
          name: websocket
          protocol: TCP
