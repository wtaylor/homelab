apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kanidm-http-redirect
spec:
  parentRefs:
  - name: default
    namespace: kube-system
    sectionName: http
  hostnames:
  - auth.w7x6t.dev
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kanidm-https-backend
spec:
  parentRefs:
  - name: default
    namespace: kube-system
    sectionName: https
  hostnames:
  - auth.w7x6t.dev
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: kanidm
      port: 443
---
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: kanidm-backend-tls
spec:
  targetRefs:
  - kind: Service
    name: kanidm
    group: ""
  validation:
    wellKnownCACertificates: System
    hostname: auth.w7x6t.dev
