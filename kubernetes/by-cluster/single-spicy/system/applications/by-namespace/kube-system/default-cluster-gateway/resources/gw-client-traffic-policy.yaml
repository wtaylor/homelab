apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: gw-default
spec:
  path:
    # Required by forgejo due to slash in name
    # https://github.com/go-gitea/gitea/issues/30748
    escapedSlashesAction: KeepUnchanged
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: default
