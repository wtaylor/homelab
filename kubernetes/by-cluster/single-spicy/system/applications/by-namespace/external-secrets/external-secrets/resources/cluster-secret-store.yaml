apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault
spec:
  provider:
    vault:
      server: https://vault.tk831.net
      path: kv
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes-single-spicy
          role: external-secrets-css
          serviceAccountRef:
            name: eso-vault-css
            namespace: external-secrets
