apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cilium-install
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: ServiceAccount
  name: cilium-install
  namespace: kube-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cilium-install
  namespace: kube-system
---
apiVersion: batch/v1
kind: Job
metadata:
  name: cilium-install
  namespace: kube-system
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        app: cilium-install
    spec:
      restartPolicy: OnFailure
      tolerations:
      - operator: Exists
      - effect: NoSchedule
        operator: Exists
      - effect: NoExecute
        operator: Exists
      - effect: PreferNoSchedule
        operator: Exists
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoExecute
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: PreferNoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
      serviceAccount: cilium-install
      serviceAccountName: cilium-install
      hostNetwork: true
      containers:
      - name: cilium-install
        image: alpine/helm:3.17
        env:
        - name: KUBERNETES_SERVICE_HOST
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: status.podIP
        - name: KUBERNETES_SERVICE_PORT
          value: "6443"
        command: [/bin/sh, -c]
        args:
        - |
          helm repo add cilium https://helm.cilium.io
          helm install cilium cilium/cilium --version 1.19.4 --namespace kube-system \
           --set ipam.mode=kubernetes \
           --set kubeProxyReplacement=true \
           --set securityContext.capabilities.ciliumAgent='{CHOWN,KILL,NET_ADMIN,NET_RAW,IPC_LOCK,SYS_ADMIN,SYS_RESOURCE,DAC_OVERRIDE,FOWNER,SETGID,SETUID}' \
           --set securityContext.capabilities.cleanCiliumState='{NET_ADMIN,SYS_ADMIN,SYS_RESOURCE}' \
           --set cgroup.autoMount.enabled=false \
           --set cgroup.hostRoot=/sys/fs/cgroup \
           --set k8sServiceHost=localhost \
           --set k8sServicePort=7445 \
           --set operator.replicas=1 \
           --set hubble.relay.enabled=true \
           --set hubble.ui.enabled=true \
           --set routingMode=tunnel \
           --set tunnelProtocol=geneve \
           --set loadbalancer.mode=dsr \
           --set loadbalancer.dsrDispatch=geneve \
           --set bpf.masquerade=true \
           --set k8s.requireIpv4PodCIDR=true \
           --set localRedirectPolicy=true \
           --set bgpControlPlane.enabled=false \
           --set l2announcements.enabled=true \
           --set l2announcements.leaseDuration=15s \
           --set l2announcements.leaseRenewDeadline=5s \
           --set l2announcements.leaseRetryPeriod=2s \
           --set l7proxy=false \
           --set gatewayAPI.enabled=false \
           --set envoy.enabled=false \
           --set k8sClientRateLimit.qps=1200 \
           --set k8sClientRateLimit.burst=1800
